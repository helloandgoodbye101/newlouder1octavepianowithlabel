<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColibriKinetix Virtual Piano</title>
    <style>
        /* FIX 1: This explicitly forces the browser to allow scrolling and pinch-to-zoom on the empty space */
        html, body {
            touch-action: auto !important;
            overscroll-behavior: auto !important;
        }

        body { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
            margin: 0; 
            padding: 0;
            background: transparent; 
            font-family: sans-serif; 
        }
        
        .piano { 
            display: flex; 
            position: relative; 
            user-select: none; 
            /* This prevents scrolling ONLY when you are actively touching the keys, so you can play without the screen jumping */
            touch-action: none; 
        }
        
        .key { border: 1px solid #000; box-sizing: border-box; cursor: pointer; transition: all 0.1s; position: relative; }
        
        /* FIX 2: Much wider, more realistic key sizes */
        /* White keys: Width increased to 130px (was 100px), Height 300px */
        .white { width: 130px; height: 300px; background: white; border-radius: 0 0 6px 6px; z-index: 1; }
        .white.active { background: #00d4ff; box-shadow: 0 0 25px #00d4ff; transform: translateY(2px); }

        /* Black keys: Width increased to 70px (was 60px), Height 180px */
        .black { width: 70px; height: 180px; background: #333; margin-left: -35px; margin-right: -35px; z-index: 2; border-radius: 0 0 4px 4px; }
        .black.active { background: #ff007f; box-shadow: 0 0 25px #ff007f; transform: translateY(2px); }

        .label { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 20px; color: #888; pointer-events: none; }

        /* MOBILE PORTRAIT (Normal phone view) */
        @media (max-width: 768px) and (orientation: portrait) {
            /* Keys must be 14.28% width so all 7 keys fit perfectly on the screen width */
            .white { width: 14.28vw; height: 25vh; } /* Made height shorter so they look wider on mobile */
            .black { width: 9vw; height: 15vh; margin-left: -4.5vw; margin-right: -4.5vw; }
            .label { font-size: 16px; font-weight: bold; bottom: 8px; }
        }

        /* MOBILE LANDSCAPE (Sideways view) */
        @media (orientation: landscape) and (max-height: 500px) {
            .white { width: 10vw; height: 60vh; }
            .black { width: 6vw; height: 35vh; margin-left: -3vw; margin-right: -3vw; }
            .label { font-size: 14px; bottom: 8px; }
        }
    </style>
</head>
<body>

<div class="piano">
    <div class="key white" data-note="C4"><span class="label">C</span></div>
    <div class="key black" data-note="C#4"></div>
    <div class="key white" data-note="D4"><span class="label">D</span></div>
    <div class="key black" data-note="D#4"></div>
    <div class="key white" data-note="E4"><span class="label">E</span></div>
    <div class="key white" data-note="F4"><span class="label">F</span></div>
    <div class="key black" data-note="F#4"></div>
    <div class="key white" data-note="G4"><span class="label">G</span></div>
    <div class="key black" data-note="G#4"></div>
    <div class="key white" data-note="A4"><span class="label">A</span></div>
    <div class="key black" data-note="A#4"></div>
    <div class="key white" data-note="B4"><span class="label">B</span></div>
</div>

<script>
    const keys = document.querySelectorAll('.key');
    let audioCtx;

    const frequencies = { 
        "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, 
        "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, 
        "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88 
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playNote(note) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = frequencies[note];
        osc.type = 'triangle';
        
        gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 2.0);
    }

    function handleInteraction(e, key) {
        e.preventDefault(); 
        if (!key.classList.contains('active')) {
            key.classList.add('active');
            playNote(key.dataset.note);
        }
    }

    function stopInteraction(key) {
        key.classList.remove('active');
    }

    keys.forEach(key => {
        key.addEventListener('mousedown', (e) => handleInteraction(e, key));
        key.addEventListener('touchstart', (e) => handleInteraction(e, key), {passive: false});
        ['mouseup', 'mouseleave', 'touchend'].forEach(evt => {
            key.addEventListener(evt, () => stopInteraction(key));
        });
    });
</script>
</body>
</html>
